<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bloom — Habits</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    .habit-card { display: grid; grid-template-columns: auto 1fr auto; gap: 16px; align-items: center; padding: 18px 22px; }
    .habit-icon { width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; flex-shrink: 0; }
    .habit-name { font-family: var(--font-display); font-size: 1.2rem; color: var(--ink); }
    .habit-meta { color: var(--ink-faint); font-size: 0.82rem; display: flex; gap: 12px; margin-top: 2px; flex-wrap: wrap; }
    .habit-streak { font-weight: 700; color: var(--rose); display: inline-flex; align-items: center; gap: 4px; }
    .habit-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(20px, 1fr)); gap: 4px; margin-top: 12px; max-width: 100%; }
    .habit-cell { aspect-ratio: 1; border-radius: 5px; background: var(--lavender-soft); cursor: pointer; transition: all 0.15s; border: 1.5px solid transparent; position: relative; }
    .habit-cell:hover { transform: scale(1.15); z-index: 2; }
    .habit-cell.checked { background: linear-gradient(135deg, var(--blush), var(--rose)); }
    .habit-cell.future { opacity: 0.3; cursor: default; pointer-events: none; }
    .habit-cell.today { border-color: var(--rose); }
    .habit-cell-label { position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%); font-size: 0.6rem; color: var(--ink-faint); opacity: 0; pointer-events: none; }
    .habit-cell:hover .habit-cell-label { opacity: 1; }
    .icon-picker { display: flex; flex-wrap: wrap; gap: 6px; max-height: 180px; overflow-y: auto; padding: 8px; background: var(--bg); border-radius: 10px; }
    .icon-picker button { width: 38px; height: 38px; border: 1.5px solid transparent; background: var(--card-bg); border-radius: 10px; font-size: 1.2rem; cursor: pointer; transition: all 0.15s; }
    .icon-picker button:hover { transform: scale(1.1); }
    .icon-picker button.selected { border-color: var(--rose); background: var(--blush-soft); }
    .color-picker { display: flex; gap: 8px; flex-wrap: wrap; }
    .color-picker button { width: 30px; height: 30px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: all 0.15s; }
    .color-picker button:hover { transform: scale(1.15); }
    .color-picker button.selected { border-color: var(--ink); box-shadow: 0 0 0 3px var(--bg); }
    .habit-actions { display: flex; gap: 6px; opacity: 0.6; transition: opacity 0.2s; }
    .habit-card:hover .habit-actions { opacity: 1; }
    .day-row { display: flex; gap: 2px; flex-wrap: wrap; margin-top: 6px; }
    .day-row button { flex: 1; min-width: 32px; padding: 6px 4px; font-size: 0.7rem; border: 1.5px solid var(--border-strong); background: transparent; color: var(--ink-soft); border-radius: 6px; cursor: pointer; font-weight: 700; }
    .day-row button.selected { background: var(--blush-soft); border-color: var(--rose); color: var(--ink); }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <div id="topbar-slot"></div>

      <div class="page-header">
        <div>
          <h1>🌱 Habits</h1>
          <div class="subtitle">Tiny things, done often, that grow you.</div>
        </div>
        <button class="btn btn-primary" onclick="openHabitEditor()">+ New habit</button>
      </div>

      <div id="habits-list"></div>

      <div class="card mt-2" id="empty-card" style="display:none;">
        <div class="empty-state">🌱<br/>No habits yet. Plant your first one — start small, even one tiny habit grows over time.</div>
      </div>
    </main>
  </div>

  <!-- Habit editor modal -->
  <div class="modal-backdrop" id="h-modal">
    <div class="modal">
      <h2 id="h-modal-title">🌱 New habit</h2>
      <input type="hidden" id="h-id">
      <div class="field">
        <label>Name</label>
        <input id="h-name" class="input" placeholder="Drink water, journal, stretch...">
      </div>
      <div class="row">
        <div class="field" style="flex:1;">
          <label>Icon</label>
          <div class="icon-picker" id="h-icons"></div>
        </div>
        <div class="field" style="flex:1;">
          <label>Color</label>
          <div class="color-picker" id="h-colors"></div>
        </div>
      </div>
      <div class="field">
        <label>Frequency</label>
        <select id="h-freq" class="select" onchange="onFreqChange()">
          <option value="daily">Every day</option>
          <option value="weekdays">Specific days of the week</option>
          <option value="times">A number of times per week</option>
        </select>
      </div>
      <div class="field" id="h-days-field" style="display:none;">
        <label>Which days?</label>
        <div class="day-row" id="h-days"></div>
      </div>
      <div class="field" id="h-times-field" style="display:none;">
        <label>Times per week</label>
        <input id="h-times" class="input" type="number" min="1" max="7" value="3">
      </div>
      <div class="modal-actions">
        <button class="btn btn-danger btn-sm hidden" id="h-delete" onclick="deleteHabitConfirm()">Delete</button>
        <button class="btn btn-ghost" onclick="closeHabit()">Cancel</button>
        <button class="btn btn-primary" onclick="saveHabit()">Save</button>
      </div>
    </div>
  </div>

  <script src="assets/js/storage.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    const HABIT_ICONS = ['🌱','💧','📖','🧘','🏃','💪','🥗','😴','🎨','✍️','🎵','🧹','☀️','🌙','🌸','💗','🦋','📿','🍵','🍎','🚶','🧴','💊','🌿','✨','🪷','📝','🎯','🍂','🌻'];
    const HABIT_COLORS = ['#F8C8DC','#FFD8B1','#D8BFD8','#C8E6C9','#FFCCBC','#B5EAD7','#C7CEEA','#FFDAC1','#E2C2FF','#FFE5A8'];
    const DOW = ['S','M','T','W','T','F','S'];

    let editing = { icon: '🌱', color: '#F8C8DC', days: [], times: 3 };

    function pad(n){return n<10?'0'+n:''+n;}
    function ymd(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}

    function streak(h) {
      let count = 0;
      const d = new Date();
      while (true) {
        const k = ymd(d);
        if (h.checks && h.checks[k]) { count++; d.setDate(d.getDate()-1); }
        else if (k === BLOOM.today() && !(h.checks && h.checks[k])) {
          // today not yet — break but don't count
          d.setDate(d.getDate()-1);
          if (count === 0 && !(h.checks && h.checks[ymd(d)])) return 0;
        }
        else break;
        if (count > 365) break;
      }
      return count;
    }

    function completionThisMonth(h) {
      const now = new Date();
      const y = now.getFullYear(), m = now.getMonth();
      const days = new Date(y, m+1, 0).getDate();
      let done = 0;
      for (let i=1;i<=days;i++) {
        const k = `${y}-${pad(m+1)}-${pad(i)}`;
        if (h.checks && h.checks[k]) done++;
      }
      return { done, days };
    }

    function freqLabel(h) {
      if (h.freq === 'weekdays') return 'On ' + (h.days||[]).map(i=>['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][i]).join(', ');
      if (h.freq === 'times') return `${h.times||3}× per week`;
      return 'Every day';
    }

    function render() {
      const habits = BLOOM.getHabits();
      document.getElementById('empty-card').style.display = habits.length ? 'none' : 'block';
      const today = BLOOM.today();
      const list = document.getElementById('habits-list');
      list.innerHTML = habits.map(h => {
        const st = streak(h);
        const cm = completionThisMonth(h);
        const now = new Date();
        const y = now.getFullYear(), m = now.getMonth();
        const daysInMonth = new Date(y, m+1, 0).getDate();
        let cells = '';
        for (let i=1;i<=daysInMonth;i++) {
          const k = `${y}-${pad(m+1)}-${pad(i)}`;
          const checked = h.checks && h.checks[k];
          const isToday = k === today;
          const future = k > today;
          cells += `<div class="habit-cell ${checked?'checked':''} ${isToday?'today':''} ${future?'future':''}" style="${checked?`background:linear-gradient(135deg, ${h.color||'#F8C8DC'}, var(--rose));`:''}" onclick="toggleCheck('${h.id}','${k}')" title="${i}">${''}</div>`;
        }
        return `
          <div class="card" style="padding:0;margin-bottom:14px;">
            <div class="habit-card">
              <div class="habit-icon" style="background:${h.color || '#F8C8DC'}40;">${h.icon || '🌱'}</div>
              <div>
                <div class="habit-name">${escapeHtml(h.name)}</div>
                <div class="habit-meta">
                  <span>${freqLabel(h)}</span>
                  <span class="habit-streak">🔥 ${st} day${st===1?'':'s'}</span>
                  <span>${cm.done}/${cm.days} this month</span>
                </div>
              </div>
              <div class="habit-actions">
                <button class="btn btn-ghost btn-sm" onclick="openHabitEditor('${h.id}')">${ICONS.edit}</button>
                <button class="btn btn-ghost btn-sm" onclick="deleteHabit('${h.id}')">${ICONS.trash}</button>
              </div>
            </div>
            <div style="padding: 0 22px 22px;">
              <div class="habit-grid">${cells}</div>
              ${st > 0 ? `<div class="text-muted mt-1" style="font-size:0.82rem; font-style:italic;">${streakMsg(st)}</div>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    function streakMsg(s) {
      if (s >= 100) return '✨ Legendary streak — you are unstoppable.';
      if (s >= 30) return '🦋 A full month strong. Look at you fly.';
      if (s >= 14) return '🌸 Two weeks of showing up. Beautiful.';
      if (s >= 7) return '🌿 One week strong — keep growing.';
      if (s >= 3) return '🌱 Momentum building. Stay gentle.';
      return '🌱 Every seed starts somewhere.';
    }

    function toggleCheck(id, date) {
      if (date > BLOOM.today()) return;
      BLOOM.toggleHabitCheck(id, date);
      render();
    }

    function buildPickers() {
      const icP = document.getElementById('h-icons');
      icP.innerHTML = HABIT_ICONS.map(i => `<button type="button" onclick="pickIcon('${i}')" data-i="${i}">${i}</button>`).join('');
      const clP = document.getElementById('h-colors');
      clP.innerHTML = HABIT_COLORS.map(c => `<button type="button" onclick="pickColor('${c}')" data-c="${c}" style="background:${c};"></button>`).join('');
      const dP = document.getElementById('h-days');
      dP.innerHTML = DOW.map((d,i) => `<button type="button" onclick="toggleDay(${i})" data-d="${i}">${d}</button>`).join('');
    }
    function pickIcon(i) {
      editing.icon = i;
      document.querySelectorAll('#h-icons button').forEach(b => b.classList.toggle('selected', b.dataset.i === i));
    }
    function pickColor(c) {
      editing.color = c;
      document.querySelectorAll('#h-colors button').forEach(b => b.classList.toggle('selected', b.dataset.c === c));
    }
    function toggleDay(i) {
      const idx = editing.days.indexOf(i);
      if (idx >= 0) editing.days.splice(idx,1); else editing.days.push(i);
      document.querySelectorAll('#h-days button').forEach(b => b.classList.toggle('selected', editing.days.includes(parseInt(b.dataset.d))));
    }
    function onFreqChange() {
      const v = document.getElementById('h-freq').value;
      document.getElementById('h-days-field').style.display = v === 'weekdays' ? 'flex' : 'none';
      document.getElementById('h-times-field').style.display = v === 'times' ? 'flex' : 'none';
    }

    function openHabitEditor(id) {
      buildPickers();
      const h = id ? BLOOM.getHabits().find(x=>x.id===id) : null;
      document.getElementById('h-modal-title').textContent = h ? '✏️ Edit habit' : '🌱 New habit';
      document.getElementById('h-id').value = h ? h.id : '';
      document.getElementById('h-name').value = h ? h.name : '';
      editing.icon = h ? (h.icon || '🌱') : '🌱';
      editing.color = h ? (h.color || HABIT_COLORS[0]) : HABIT_COLORS[0];
      editing.days = h ? (h.days || []).slice() : [];
      editing.times = h ? (h.times || 3) : 3;
      document.getElementById('h-freq').value = h ? (h.freq || 'daily') : 'daily';
      document.getElementById('h-times').value = editing.times;
      onFreqChange();
      pickIcon(editing.icon);
      pickColor(editing.color);
      editing.days.forEach(i => {
        const b = document.querySelector(`#h-days button[data-d="${i}"]`);
        if (b) b.classList.add('selected');
      });
      document.getElementById('h-delete').classList.toggle('hidden', !h);
      document.getElementById('h-modal').classList.add('open');
      setTimeout(() => document.getElementById('h-name').focus(), 60);
    }
    function closeHabit() { document.getElementById('h-modal').classList.remove('open'); }
    function saveHabit() {
      const id = document.getElementById('h-id').value;
      const data = {
        name: document.getElementById('h-name').value.trim(),
        icon: editing.icon,
        color: editing.color,
        freq: document.getElementById('h-freq').value,
        days: editing.days,
        times: parseInt(document.getElementById('h-times').value || '3', 10)
      };
      if (!data.name) return toast('Please name your habit 🌱');
      if (id) { BLOOM.updateHabit(id, data); toast('Updated 🌿', 'success'); }
      else { BLOOM.addHabit(data); toast('Habit planted 🌸', 'success'); }
      closeHabit();
      render();
    }
    function deleteHabit(id) {
      if (confirm('Delete this habit and all its history?')) { BLOOM.deleteHabit(id); toast('Habit removed 🌿'); render(); }
    }
    function deleteHabitConfirm() {
      const id = document.getElementById('h-id').value;
      if (id && confirm('Delete this habit and all its history?')) { BLOOM.deleteHabit(id); closeHabit(); toast('Habit removed 🌿'); render(); }
    }
    document.getElementById('h-modal').addEventListener('click', (e) => { if (e.target.id === 'h-modal') closeHabit(); });

    window.refreshPage = render;
    renderShell('habits');
    render();
  </script>
</body>
</html>
