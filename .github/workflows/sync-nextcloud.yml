name: Sync to Nextcloud

# Triggers: every push to main + manual trigger from Actions tab
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Configure rclone for Nextcloud
        env:
          NC_PASS: ${{ secrets.NEXTCLOUD_PASS }}
        run: |
          mkdir -p ~/.config/rclone
          OBSCURED=$(rclone obscure "$NC_PASS")
          cat > ~/.config/rclone/rclone.conf <<EOF
          [nextcloud]
          type = webdav
          url = ${{ secrets.NEXTCLOUD_URL }}
          vendor = nextcloud
          user = ${{ secrets.NEXTCLOUD_USER }}
          pass = $OBSCURED
          EOF

      - name: Ensure destination folder exists
        run: |
          rclone mkdir nextcloud:${{ secrets.NEXTCLOUD_PATH }} || true

      - name: Sync to Nextcloud
        run: |
          rclone sync . nextcloud:${{ secrets.NEXTCLOUD_PATH }} \
            --exclude ".git/**" \
            --exclude ".github/**" \
            --exclude ".DS_Store" \
            --exclude "node_modules/**" \
            --exclude "*.log" \
            --create-empty-src-dirs \
            --ignore-errors \
            --progress \
            -v

      - name: Done
        run: echo "🌸 Synced to Nextcloud successfully"
