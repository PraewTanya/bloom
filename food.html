<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bloom — Food</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    .type-chip { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:99px; font-size:0.72rem; font-weight:700; }
    .type-regular { background: var(--peach-soft); color: #A06820; }
    .type-healthy { background: var(--sage-soft); color: #4A7E50; }
    .cat-chip { display:inline-flex; align-items:center; padding:3px 10px; border-radius:99px; font-size:0.72rem; font-weight:700; background: var(--lavender-soft); color: var(--ink); }
    .heart-btn { background:none; border:none; cursor:pointer; font-size:1.2rem; padding:4px; transition:transform 0.15s; color: var(--border-strong); }
    .heart-btn.loved { color: var(--rose); }
    .heart-btn:hover { transform: scale(1.2); }
    .nutrition-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; }
    .nutrition-grid .field { margin: 0; }
    .recipe-section { background: var(--bg); padding: 14px 16px; border-radius: 12px; margin-bottom: 12px; }
    .recipe-section h4 { margin: 0 0 8px; font-family: var(--font-display); font-size: 1.05rem; }
    .recipe-text { white-space: pre-wrap; line-height: 1.7; color: var(--ink-soft); }
    .nut-stat { padding: 10px 12px; background: var(--card-bg); border-radius: 10px; border: 1px solid var(--border); text-align:center; }
    .nut-stat .v { font-family: var(--font-display); font-size: 1.2rem; color: var(--ink); }
    .nut-stat .l { font-size: 0.7rem; color: var(--ink-faint); letter-spacing: 0.06em; text-transform: uppercase; font-weight: 700; }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <div id="topbar-slot"></div>

      <!-- LIST VIEW -->
      <div id="list-view">
        <div class="page-header">
          <div>
            <h1>🍰 Food</h1>
            <div class="subtitle">Recipes you love, with the photos, ingredients, and your thoughts.</div>
          </div>
          <button class="btn btn-primary" onclick="openEditor()">+ New recipe</button>
        </div>

        <div class="grid grid-4" style="margin-bottom:24px;">
          <div class="stat-card">
            <span class="stat-label">Total recipes</span>
            <span class="stat-value" id="stat-total">0</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Healthy recipes</span>
            <span class="stat-value" id="stat-healthy">0</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Loved</span>
            <span class="stat-value" id="stat-loved">0</span>
            <span class="stat-hint">Your top dishes</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Avg rating</span>
            <span class="stat-value" id="stat-rating">—</span>
          </div>
        </div>

        <div class="filter-bar">
          <input id="q" class="input" placeholder="Search title, ingredient, comment..." style="flex:1; min-width:220px;" oninput="render()">
          <select id="f-type" class="select" onchange="render()" style="min-width:140px;">
            <option value="">All types</option>
            <option value="regular">🍔 Regular</option>
            <option value="healthy">🥗 Healthy</option>
          </select>
          <select id="f-cat" class="select" onchange="render()" style="min-width:140px;">
            <option value="">All categories</option>
            <option value="main">🍽️ Main dish</option>
            <option value="dessert">🍰 Dessert</option>
            <option value="snack">🍿 Snack</option>
            <option value="drink">🥤 Drink</option>
          </select>
          <select id="f-special" class="select" onchange="render()" style="min-width:140px;">
            <option value="">All</option>
            <option value="loved">💗 Loved only</option>
          </select>
          <select id="f-sort" class="select" onchange="render()" style="min-width:140px;">
            <option value="recent">Recently added</option>
            <option value="rating">Top rated</option>
            <option value="title">A → Z</option>
          </select>
        </div>

        <div id="grid"></div>
      </div>

      <!-- DETAIL VIEW -->
      <div id="detail-view" style="display:none;">
        <div class="page-header">
          <div>
            <button class="back-btn" onclick="goList()" style="margin-bottom:8px;"></button>
            <h1 id="d-title">Recipe</h1>
            <div class="subtitle" id="d-tags"></div>
          </div>
          <div style="display:flex; gap:8px;">
            <button class="heart-btn" id="d-heart" onclick="toggleLoved(currentId)" title="Love"></button>
            <button class="btn btn-secondary" onclick="openEditor(currentId)">Edit</button>
          </div>
        </div>

        <div class="grid grid-2">
          <div>
            <div id="d-image-wrap" style="border-radius: var(--radius); overflow:hidden; aspect-ratio:1; background: linear-gradient(135deg, var(--blush-soft), var(--lavender-soft)); display:flex; align-items:center; justify-content:center; font-size:5rem;">🍽️</div>
            <div id="d-source" style="margin-top:14px;"></div>
            <div class="card mt-2">
              <div class="card-title">🍴 My take</div>
              <div class="rating-stars" id="d-rating" style="margin-bottom:8px;"></div>
              <div class="recipe-text" id="d-comment"></div>
            </div>
          </div>
          <div>
            <div class="recipe-section">
              <h4>🥕 Ingredients</h4>
              <div class="recipe-text" id="d-ing"></div>
            </div>
            <div class="recipe-section">
              <h4>👩‍🍳 Instructions</h4>
              <div class="recipe-text" id="d-inst"></div>
            </div>
            <div class="recipe-section">
              <h4>📊 Nutrition (per serving)</h4>
              <div class="grid grid-4" id="d-nutrition" style="gap:8px; margin-bottom:8px;"></div>
              <div class="recipe-text" id="d-nut-notes" style="font-size:0.85rem; font-style:italic;"></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Editor modal -->
  <div class="modal-backdrop" id="r-modal">
    <div class="modal" style="max-width:640px;">
      <h2 id="r-title">🍰 New recipe</h2>
      <input type="hidden" id="r-id">

      <div class="field"><label>Title</label><input id="rf-title" class="input" placeholder="Pad thai, matcha latte, etc."></div>

      <div class="row">
        <div class="field">
          <label>Type</label>
          <select id="rf-type" class="select">
            <option value="regular">🍔 Regular</option>
            <option value="healthy">🥗 Healthy</option>
          </select>
        </div>
        <div class="field">
          <label>Category</label>
          <select id="rf-cat" class="select">
            <option value="main">🍽️ Main dish</option>
            <option value="dessert">🍰 Dessert</option>
            <option value="snack">🍿 Snack</option>
            <option value="drink">🥤 Drink</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label>Photo</label>
        <div id="img-pic"></div>
      </div>

      <div class="field">
        <label>Source URL (recipe link)</label>
        <input id="rf-source" class="input" placeholder="https://...">
      </div>

      <div class="field">
        <label>Ingredients</label>
        <textarea id="rf-ing" class="textarea" style="min-height:120px;" placeholder="- 2 eggs&#10;- 1 cup flour&#10;- 1 tsp salt..."></textarea>
      </div>

      <div class="field">
        <label>Instructions</label>
        <textarea id="rf-inst" class="textarea" style="min-height:140px;" placeholder="1. Mix the flour and eggs&#10;2. ..."></textarea>
      </div>

      <h3 style="font-family:var(--font-display); font-size:1.1rem; margin: 14px 0 10px;">📊 Nutrition (per serving, optional)</h3>
      <div class="nutrition-grid">
        <div class="field"><label>Calories</label><input id="rf-cal" class="input" type="number" min="0" placeholder="0"></div>
        <div class="field"><label>Protein (g)</label><input id="rf-protein" class="input" type="number" step="0.1" min="0"></div>
        <div class="field"><label>Carbs (g)</label><input id="rf-carbs" class="input" type="number" step="0.1" min="0"></div>
        <div class="field"><label>Fat (g)</label><input id="rf-fat" class="input" type="number" step="0.1" min="0"></div>
        <div class="field"><label>Fiber (g)</label><input id="rf-fiber" class="input" type="number" step="0.1" min="0"></div>
        <div class="field"><label>Sodium (mg)</label><input id="rf-sodium" class="input" type="number" min="0"></div>
      </div>
      <div class="field">
        <label>Nutrition notes (optional)</label>
        <input id="rf-nut-notes" class="input" placeholder="Allergens, special ingredients, etc.">
      </div>

      <h3 style="font-family:var(--font-display); font-size:1.1rem; margin: 14px 0 10px;">🍴 My take</h3>
      <div class="field">
        <label>Rating</label>
        <div class="rating-stars" id="rf-rating"></div>
      </div>
      <div class="field">
        <label>Comment — do you love it?</label>
        <textarea id="rf-comment" class="textarea" placeholder="What did you think? Will you make it again? Any tweaks?"></textarea>
      </div>
      <div class="field">
        <label>Mark as loved (favourite)</label>
        <div class="switch" id="rf-loved" onclick="toggleLovedEdit()"></div>
      </div>

      <div class="modal-actions">
        <button class="btn btn-danger btn-sm hidden" id="r-del" onclick="del()">Delete</button>
        <button class="btn btn-ghost" onclick="close_()">Cancel</button>
        <button class="btn btn-primary" onclick="save()">Save</button>
      </div>
    </div>
  </div>

  <script src="assets/js/storage.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    const NS = 'recipes';
    const CAT_ICON = { main:'🍽️', dessert:'🍰', snack:'🍿', drink:'🥤' };
    const CAT_LABEL = { main:'Main dish', dessert:'Dessert', snack:'Snack', drink:'Drink' };
    const TYPE_ICON = { regular:'🍔', healthy:'🥗' };
    const TYPE_LABEL = { regular:'Regular', healthy:'Healthy' };

    let currentId = null;
    let rating = 0;
    let editingLoved = false;

    function renderStars(into, value, interactive) {
      let html = '';
      for (let i=1;i<=5;i++) html += `<button type="button" class="${i<=value?'on':''}" ${interactive?`onclick="pickRating(${i})"`:''} ${interactive?'':'disabled'}>★</button>`;
      into.innerHTML = html;
    }
    function pickRating(v) { rating = (rating === v) ? 0 : v; renderStars(document.getElementById('rf-rating'), rating, true); }
    function toggleLovedEdit() {
      editingLoved = !editingLoved;
      document.getElementById('rf-loved').classList.toggle('on', editingLoved);
    }
    function toggleLoved(id) {
      const x = BLOOM.getCollection(NS).find(r => r.id === id);
      if (!x) return;
      BLOOM.updateInCollection(NS, id, { loved: !x.loved });
      if (currentId === id) renderDetail();
      else render();
    }

    /* ============== LIST ============== */
    async function render() {
      const q = (document.getElementById('q').value || '').toLowerCase();
      const ft = document.getElementById('f-type').value;
      const fc = document.getElementById('f-cat').value;
      const fsp = document.getElementById('f-special').value;
      const sort = document.getElementById('f-sort').value;
      let items = BLOOM.getCollection(NS);

      // Stats
      document.getElementById('stat-total').textContent = items.length;
      document.getElementById('stat-healthy').textContent = items.filter(x => x.type === 'healthy').length;
      document.getElementById('stat-loved').textContent = items.filter(x => x.loved).length;
      const rated = items.filter(x => x.rating);
      document.getElementById('stat-rating').textContent = rated.length ? (rated.reduce((s,x) => s + x.rating, 0) / rated.length).toFixed(1) + '★' : '—';

      // Filter
      if (ft) items = items.filter(x => x.type === ft);
      if (fc) items = items.filter(x => x.category === fc);
      if (fsp === 'loved') items = items.filter(x => x.loved);
      if (q) items = items.filter(x =>
        (x.title || '').toLowerCase().includes(q) ||
        (x.ingredients || '').toLowerCase().includes(q) ||
        (x.comment || '').toLowerCase().includes(q));
      if (sort === 'recent') items.sort((a,b) => (b.createdAt||0)-(a.createdAt||0));
      else if (sort === 'rating') items.sort((a,b) => (b.rating||0)-(a.rating||0));
      else if (sort === 'title') items.sort((a,b) => (a.title||'').localeCompare(b.title||''));

      const box = document.getElementById('grid');
      if (items.length === 0) {
        box.innerHTML = '<div class="card empty-state">🍰<br/>No recipes yet. Add your first one.</div>';
        return;
      }
      box.innerHTML = '<div class="lib-grid">' + items.map(x => `
        <div class="lib-card" onclick="goDetail('${x.id}')">
          ${x.image ? `<img class="lib-thumb thumb-square" alt="" data-img-src="${escapeHtml(x.image)}" onerror="this.outerHTML='<div class=&quot;lib-thumb thumb-square&quot;>${CAT_ICON[x.category] || '🍽️'}</div>'">` : `<div class="lib-thumb thumb-square">${CAT_ICON[x.category] || '🍽️'}</div>`}
          <div class="lib-body">
            <div style="display:flex; gap:8px; align-items:flex-start;">
              <div class="lib-title" style="flex:1;">${escapeHtml(x.title || '(untitled)')}</div>
              <button class="heart-btn ${x.loved?'loved':''}" onclick="event.stopPropagation(); toggleLoved('${x.id}')" title="Love">${x.loved ? '♥' : '♡'}</button>
            </div>
            ${x.rating ? `<div class="lib-rating">${'★'.repeat(x.rating)}${'☆'.repeat(5-x.rating)}</div>` : ''}
            <div class="lib-meta">
              <span class="type-chip type-${x.type || 'regular'}">${TYPE_ICON[x.type] || '🍔'} ${TYPE_LABEL[x.type] || ''}</span>
              <span class="cat-chip">${CAT_ICON[x.category] || '🍽️'} ${CAT_LABEL[x.category] || ''}</span>
            </div>
          </div>
        </div>
      `).join('') + '</div>';
      await resolveAllImages();
    }

    /* ============== DETAIL ============== */
    async function goDetail(id) {
      currentId = id;
      document.getElementById('list-view').style.display = 'none';
      document.getElementById('detail-view').style.display = 'block';
      document.querySelector('#detail-view .back-btn').innerHTML = ICONS.chevronL + '<span>All recipes</span>';
      await renderDetail();
    }
    function goList() {
      currentId = null;
      document.getElementById('list-view').style.display = 'block';
      document.getElementById('detail-view').style.display = 'none';
      render();
    }

    async function renderDetail() {
      const x = BLOOM.getCollection(NS).find(r => r.id === currentId);
      if (!x) return goList();
      document.getElementById('d-title').textContent = x.title || '(untitled)';
      document.getElementById('d-tags').innerHTML = `<span class="type-chip type-${x.type || 'regular'}">${TYPE_ICON[x.type] || ''} ${TYPE_LABEL[x.type] || ''}</span> <span class="cat-chip">${CAT_ICON[x.category] || ''} ${CAT_LABEL[x.category] || ''}</span>`;
      // image
      const imgWrap = document.getElementById('d-image-wrap');
      if (x.image) {
        const src = await resolveImgSrc(x.image);
        if (src) imgWrap.innerHTML = `<img src="${src}" alt="" style="width:100%; height:100%; object-fit:cover;">`;
        else imgWrap.innerHTML = CAT_ICON[x.category] || '🍽️';
      } else {
        imgWrap.innerHTML = CAT_ICON[x.category] || '🍽️';
      }
      // source
      document.getElementById('d-source').innerHTML = x.sourceUrl ? `🔗 <a href="${escapeHtml(x.sourceUrl)}" target="_blank" rel="noopener" style="word-break:break-all;">${escapeHtml(x.sourceUrl)}</a>` : '';
      // rating
      renderStars(document.getElementById('d-rating'), x.rating || 0, false);
      // comment
      document.getElementById('d-comment').textContent = x.comment || 'No comment yet.';
      // ingredients
      document.getElementById('d-ing').textContent = x.ingredients || 'No ingredients listed.';
      // instructions
      document.getElementById('d-inst').textContent = x.instructions || 'No instructions yet.';
      // nutrition
      const n = x.nutrition || {};
      const items = [
        { l:'Calories', v: n.calories, u:'' },
        { l:'Protein', v: n.protein, u:'g' },
        { l:'Carbs', v: n.carbs, u:'g' },
        { l:'Fat', v: n.fat, u:'g' },
        { l:'Fiber', v: n.fiber, u:'g' },
        { l:'Sodium', v: n.sodium, u:'mg' }
      ].filter(it => it.v != null && it.v !== '' && it.v !== 0);
      document.getElementById('d-nutrition').innerHTML = items.length === 0 ? '<div style="grid-column:1/-1; color:var(--ink-faint); font-style:italic; padding:6px;">No nutrition info yet.</div>' : items.map(it => `<div class="nut-stat"><div class="v">${it.v}${it.u}</div><div class="l">${it.l}</div></div>`).join('');
      document.getElementById('d-nut-notes').textContent = n.notes || '';
      // loved heart
      const heart = document.getElementById('d-heart');
      heart.classList.toggle('loved', !!x.loved);
      heart.innerHTML = x.loved ? '♥' : '♡';
    }

    /* ============== EDIT ============== */
    async function openEditor(id) {
      const x = id ? BLOOM.getCollection(NS).find(r => r.id === id) : null;
      document.getElementById('r-title').textContent = x ? '✏️ Edit recipe' : '🍰 New recipe';
      document.getElementById('r-id').value = x ? x.id : '';
      document.getElementById('rf-title').value = x ? (x.title || '') : '';
      document.getElementById('rf-type').value = x ? (x.type || 'regular') : 'regular';
      document.getElementById('rf-cat').value = x ? (x.category || 'main') : 'main';
      document.getElementById('rf-source').value = x ? (x.sourceUrl || '') : '';
      document.getElementById('rf-ing').value = x ? (x.ingredients || '') : '';
      document.getElementById('rf-inst').value = x ? (x.instructions || '') : '';
      const n = (x && x.nutrition) || {};
      document.getElementById('rf-cal').value = n.calories || '';
      document.getElementById('rf-protein').value = n.protein || '';
      document.getElementById('rf-carbs').value = n.carbs || '';
      document.getElementById('rf-fat').value = n.fat || '';
      document.getElementById('rf-fiber').value = n.fiber || '';
      document.getElementById('rf-sodium').value = n.sodium || '';
      document.getElementById('rf-nut-notes').value = n.notes || '';
      document.getElementById('rf-comment').value = x ? (x.comment || '') : '';
      rating = x ? (x.rating || 0) : 0;
      renderStars(document.getElementById('rf-rating'), rating, true);
      editingLoved = x ? !!x.loved : false;
      document.getElementById('rf-loved').classList.toggle('on', editingLoved);
      await ImagePicker.init('img-pic', x ? (x.image || '') : '');
      document.getElementById('r-del').classList.toggle('hidden', !x);
      document.getElementById('r-modal').classList.add('open');
      setTimeout(() => document.getElementById('rf-title').focus(), 60);
    }
    function close_() { document.getElementById('r-modal').classList.remove('open'); }
    function save() {
      const id = document.getElementById('r-id').value;
      const data = {
        title: document.getElementById('rf-title').value.trim(),
        type: document.getElementById('rf-type').value,
        category: document.getElementById('rf-cat').value,
        image: ImagePicker.get('img-pic'),
        sourceUrl: document.getElementById('rf-source').value.trim(),
        ingredients: document.getElementById('rf-ing').value,
        instructions: document.getElementById('rf-inst').value,
        nutrition: {
          calories: parseFloat(document.getElementById('rf-cal').value) || 0,
          protein: parseFloat(document.getElementById('rf-protein').value) || 0,
          carbs: parseFloat(document.getElementById('rf-carbs').value) || 0,
          fat: parseFloat(document.getElementById('rf-fat').value) || 0,
          fiber: parseFloat(document.getElementById('rf-fiber').value) || 0,
          sodium: parseFloat(document.getElementById('rf-sodium').value) || 0,
          notes: document.getElementById('rf-nut-notes').value.trim()
        },
        rating: rating,
        comment: document.getElementById('rf-comment').value,
        loved: editingLoved
      };
      if (!data.title) return toast('Please add a title 🌱');
      let saved;
      if (id) { BLOOM.updateInCollection(NS, id, data); saved = id; toast('Updated 🌿', 'success'); }
      else { saved = BLOOM.addToCollection(NS, data).id; toast('Recipe added 🍰', 'success'); }
      close_();
      if (currentId) { currentId = saved; renderDetail(); } else render();
    }
    async function del() {
      const id = document.getElementById('r-id').value;
      if (id && confirm('Delete this recipe?')) {
        const x = BLOOM.getCollection(NS).find(r => r.id === id);
        if (x) await maybeDeleteLocalImage(x.image);
        BLOOM.deleteFromCollection(NS, id);
        close_();
        toast('Removed 🌿');
        if (currentId) goList();
        else render();
      }
    }
    document.getElementById('r-modal').addEventListener('click', (e) => { if (e.target.id === 'r-modal') close_(); });

    window.refreshPage = () => currentId ? renderDetail() : render();
    renderShell('food');
    render();
  </script>
</body>
</html>
